<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 30 340 340">
  <defs>
    <linearGradient id="codeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="kAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="50" y="30" width="340" height="340" rx="68"/>
    </clipPath>
  </defs>
  <g clip-path="url(#iconClip)">
    <rect x="50" y="30" width="340" height="340" fill="url(#codeBg)"/>
    <!-- Subtle grid pattern -->
    <g opacity="0.04" stroke="#60a5fa" stroke-width="0.5">
      <line x1="50" y1="80" x2="390" y2="80"/>
      <line x1="50" y1="130" x2="390" y2="130"/>
      <line x1="50" y1="180" x2="390" y2="180"/>
      <line x1="50" y1="230" x2="390" y2="230"/>
      <line x1="50" y1="280" x2="390" y2="280"/>
      <line x1="50" y1="330" x2="390" y2="330"/>
      <line x1="100" y1="30" x2="100" y2="370"/>
      <line x1="150" y1="30" x2="150" y2="370"/>
      <line x1="200" y1="30" x2="200" y2="370"/>
      <line x1="250" y1="30" x2="250" y2="370"/>
      <line x1="300" y1="30" x2="300" y2="370"/>
      <line x1="350" y1="30" x2="350" y2="370"/>
    </g>
    <!-- Centered {K} group -->
    <g transform="translate(224, 195)">
      <text x="-85" y="15" text-anchor="middle" dominant-baseline="central" fill="#60a5fa" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" font-size="130" font-weight="300" opacity="0.9">{</text>
      <g transform="translate(-41, -54)">
        <rect x="0" y="0" width="18" height="108" rx="3" fill="url(#kAccent)"/>
        <polygon points="18,54 18,38 72,0 82,0 82,18 30,54" fill="url(#kAccent)"/>
        <polygon points="18,54 18,70 72,108 82,108 82,90 30,54" fill="url(#kAccent)"/>
        <circle cx="82" cy="9" r="4" fill="#a78bfa" opacity="0.8"/>
      </g>
      <text x="85" y="15" text-anchor="middle" dominant-baseline="central" fill="#60a5fa" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" font-size="130" font-weight="300" opacity="0.9">}</text>
    </g>
  </g>
  <rect x="50" y="30" width="340" height="340" rx="68" fill="none" stroke="#1e293b" stroke-width="1"/>
</svg>
